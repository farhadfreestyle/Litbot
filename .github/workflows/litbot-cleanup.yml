name: LitBot monthly cleanup

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Delete old papers
        run: python delete_old_papers.py

      - name: Commit and push cleanup
        run: |
          git config user.name "litbot-bot"
          git config user.email "litbot-bot@users.noreply.github.com"
          git add paper_history.json
          git diff --staged --quiet || git commit -m "Automated LitBot cleanup: $(date -u +'%Y-%m-%d')"
          git push
