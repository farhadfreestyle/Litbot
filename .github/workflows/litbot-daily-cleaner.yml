name: LitBot daily cleaner

on:
  schedule:

    - cron: '50 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-cleaner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily cleaner
        run: python daily_cleaner.py

      - name: Commit and push cleaned data
        run: |
          git config user.name "litbot-bot"
          git config user.email "litbot-bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Automated daily cleanup: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
