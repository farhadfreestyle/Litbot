name: LitBot pipeline

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch: {}  

permissions:
  contents: write   

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch today's papers
        run: python file_fetching.py

      - name: Score papers with GenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python genai_results_generator.py

      - name: Update paper history database
        run: python json_database.py

      - name: Commit and push updated data
        run: |
          git config user.name "litbot-bot"
          git config user.email "litbot-bot@users.noreply.github.com"
          git add todays_papers.json paper_history.json
          git diff --staged --quiet || git commit -m "Automated LitBot run: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
